%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/fixed-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Binding for simple fixed-rate clock sources

maintainers:
  - Michael Turquette <mturquette@baylibre.com>
  - Stephen Boyd <sboyd@kernel.org>

properties:
  compatible:
    const: fixed-clock

  "#clock-cells":
    const: 0

  clock-frequency: true

  clock-accuracy:
    description: accuracy of clock in ppb (parts per billion).
    $ref: /schemas/types.yaml#/definitions/uint32

  clock-output-names:
    maxItems: 1

  st,bypass:
    type: boolean
    description: configures the oscillator bypass mode for LSE and HSE
                  (HSEBYP, LSEBYP)
  st,digbypass:
    type: boolean
    description: configures the bypass mode as full-swing digital
                  signal (DIGBYP)
  st,css:
    type: boolean
    description: activates the clock security system (HSECSSON, LSECSSON)

  st,drive:
    type: int
    description: (only for LSE) contains the value of the drive for the
                  oscillator
    enum: [0, 1, 2, 3]

required:
  - compatible
  - "#clock-cells"
  - clock-frequency

additionalProperties: false

examples:
  - |
    clock {
      compatible = "fixed-clock";
      #clock-cells = <0>;
      clock-frequency = <1000000000>;
      clock-accuracy = <100>;
    };
...
